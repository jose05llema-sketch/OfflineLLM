AutoName: OfflineLLM
Description: |-
    A fully offline, private AI chat app for Android. All LLM inference runs
    on-device via llama.cpp — no internet, no cloud, no tracking. The app
    requests zero network permissions, so it literally cannot phone home.

    Load any GGUF model from local storage and chat entirely on-device.
    Features include configurable sampling parameters, multiple assistant
    personas, Material 3 theming, and optional biometric app lock.

